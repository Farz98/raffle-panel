<!DOCTYPE html>
<html>

<head>
    <title>🎯 Winner Generator</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            padding: 20px;
        }

        .panel {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            margin: auto;
        }

        button {
            padding: 10px 20px;
            background: #3498db;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        input {
            padding: 8px;
            margin: 5px;
        }

        h2 {
            text-align: center;
        }

        #result {
            margin-top: 20px;
            font-size: 20px;
            text-align: center;
        }

        /* 🔥 Fancy Loader */
        #loader {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        .raffle-box {
            text-align: center;
            color: white;
        }

        .machine {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .slot {
            width: 70px;
            height: 90px;
            background: #111;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 3px solid #3498db;
            box-shadow: 0 0 15px #3498db;
        }

        .digit {
            font-size: 50px;
            color: #00ffcc;
            font-weight: bold;
            transition: transform 0.1s ease;
        }

        .reel {
            font-size: 50px;
            line-height: 80px;
            text-align: center;
            color: #00ffcc;
            will-change: transform;
        }

        /* Continuous smooth spinning */
        .spinning {
            animation: spinLoop linear infinite;
        }

        /* Different speeds */
        .slot:nth-child(1) .reel.spinning {
            animation-duration: 0.5s;
        }

        .slot:nth-child(2) .reel.spinning {
            animation-duration: 0.7s;
        }

        .slot:nth-child(3) .reel.spinning {
            animation-duration: 0.9s;
        }

        @keyframes spinLoop {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-50%);
            }
        }

        /* Different speeds for realism */
        .slot:nth-child(1) .reel {
            animation-duration: 0.7s;
        }

        .slot:nth-child(2) .reel {
            animation-duration: 0.9s;
        }

        .slot:nth-child(3) .reel {
            animation-duration: 1.1s;
        }

        @keyframes spinReel {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-800px);
            }
        }

        .loading-text {
            font-size: 18px;
            margin-top: 10px;
            animation: blink 1.2s infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }
        }

        .dashboard-table {
    width: 100%;
    background: #fff;
    border-collapse: collapse;
    margin-top: 15px;
    border-radius: 8px;
    overflow: hidden;
}

.dashboard-table th {
    background: #f1f3f5;
    font-weight: 600;
    font-size: 13px;
    padding: 10px;
    text-align: center;
}

.dashboard-table td {
    padding: 8px;
    font-size: 13px;
    text-align: center;
    border-bottom: 1px solid #eee;
}

.dashboard-table tr:hover {
    background: #f9fafb;
}

/* Winner highlight */
.winner-badge {
    background: #2ecc71;
    color: white;
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: bold;
}

/* Count badge */
.count-badge {
    background: #3498db;
    color: white;
    padding: 3px 8px;
    border-radius: 6px;
}
    </style>
</head>

<body>

    <div class="panel">
        <h2>🎯 Winner Generator</h2>

        <label>Date:</label>
        <input type="date" id="startDate">

        <br><br>

        <button onclick="generateWinner()">Generate Winner</button>

        <div id="result"></div>
    </div>

    <div class="panel">
    <h3>📜 Recent Draw History</h3>

    <table class="dashboard-table">
        <thead>
            <tr>
                <th>#</th>
                <th>Winner</th>
                <th>Total</th>
                <th>Date</th>
                <th>Draw Time</th>
            </tr>
        </thead>
        <tbody id="historyTable"></tbody>
    </table>
</div>

    <!-- Loader -->
    <div id="loader">
        <div class="raffle-box">
            <div class="machine">
                <div class="slot">
                    <div class="digit">1</div>
                </div>
                <div class="slot">
                    <div class="digit">1</div>
                </div>
                <div class="slot">
                    <div class="digit">1</div>
                </div>
            </div>

            <p class="loading-text">🎯 Drawing Winning Number...</p>
        </div>
    </div>


    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, addDoc, limit, orderBy } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-auth.js";


        // 🔧 CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDowv99kR6eCENVMaA1cyPAhB-uioHTKdo",
            authDomain: "raffle-fd694.firebaseapp.com",
            projectId: "raffle-fd694"
        };

        // Init
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Loader
        function showLoader() {
            startSpin();
            document.getElementById("loader").style.display = "flex";
        }

        function hideLoader() {
            document.getElementById("loader").style.display = "none";
        }
        let adminUser = JSON.parse(localStorage.getItem("adminUser"));
        if (!adminUser) {
            localStorage.removeItem("adminUser");
            window.location.href = "index.html";
        }

        // Normalize digits (group permutations)
        function getKey(digits) {
            return digits.split("").sort().join("");
        }

        function showFinalDigits(winner) {
            const reels = document.querySelectorAll(".reel");

            reels.forEach((reel, index) => {
                reel.style.animation = "none";
                reel.innerText = winner[index]; // show 1, 2, 3
            });
        }
        var spinIntervals = [];
        function startSpin() {


            const digits = document.querySelectorAll(".digit");

            digits.forEach((el, index) => {

                let num = Math.floor(Math.random() * 9) + 1;

                spinIntervals[index] = setInterval(() => {
                    num = num % 9 + 1; // loop 1 → 9
                    el.innerText = num;

                    // small bounce effect
                    el.style.transform = "scale(1.2)";
                    setTimeout(() => {
                        el.style.transform = "scale(1)";
                    }, 80);

                }, 80 + (index * 40)); // different speeds
            });
        }

        function stopSpinWithResult(winner) {

            const digits = document.querySelectorAll(".digit");

            // Stop 1st slot
            setTimeout(() => {
                clearInterval(spinIntervals[0]);
                digits[0].innerText = winner[0];
            }, 1000);

            // Stop 2nd slot
            setTimeout(() => {
                clearInterval(spinIntervals[1]);
                digits[1].innerText = winner[1];
            }, 1500);

            // Stop 3rd slot
            setTimeout(() => {
                clearInterval(spinIntervals[2]);
                digits[2].innerText = winner[2];
            }, 2000);


            // Hide loader after finish
            setTimeout(() => {
                hideLoader();
            }, 2600);
        }

        // 🎯 MAIN FUNCTION
        window.generateWinner = async function () {

            const start = document.getElementById("startDate").value;

            if (!start) {
                alert("Select date");
                return;
            }

            showLoader();

            try {

                const historyQuery = query(
                    collection(db, "winner_history"),
                    where("date", "==", start)
                );

                const historySnap = await getDocs(historyQuery);

                if (!historySnap.empty) {
                    setTimeout(() => {
                        hideLoader();
                    }, 1500);
                    document.getElementById("result").innerHTML =
                        "⚠️ Winner already drawn for " + start;
                    return;
                }

                const from = new Date(start);
                const to = new Date(start);
                to.setHours(23, 59, 59, 999);

                const q = query(
                    collection(db, "raffles"),
                    where("createdAt", ">=", from),
                    where("createdAt", "<=", to)
                );

                const snap = await getDocs(q);

                const map = {};

                snap.forEach(doc => {
                    const d = doc.data().digits;
                    if (!d) return;

                    const key = getKey(d);

                    if (!map[key]) {
                        map[key] = {
                            count: 0,
                            samples: []
                        };
                    }

                    map[key].count++;
                    map[key].samples.push(d);
                });

                // 🎯 Filter valid winners (5–10))
                const valid = Object.entries(map)
                    .filter(([k, v]) => v.count >= 5 && v.count <= 10);

                if (valid.length === 0) {
                    document.getElementById("result").innerHTML =
                        "❌ No valid winning combination found (5–10 range)";
                    return;
                }

                // 🎲 Random selection
                const selected = valid[Math.floor(Math.random() * valid.length)];

                const winnerKey = selected[0];
                const winnerCount = selected[1].count;

                // 💾 Save to Firestore
                await addDoc(collection(db, "winner_history"), {
                    winnerKey,
                    count: winnerCount,
                    date: start,
                    createdAt: new Date()
                });

                document.getElementById("result").innerHTML = `
            🎉 Winner Digit: <b>${winnerKey}</b><br/>
            🏆 Total Winners: ${winnerCount}
        `;
                stopSpinWithResult(winnerKey)
                loadHistory();

            } catch (e) {
                console.error(e);
                alert("Error generating winner");
            }
            finally {
                setTimeout(() => {
                    hideLoader();
                }, 1500);
            }
        };

        window.loadHistory = async function () {

    try {
        const q = query(
            collection(db, "winner_history"),
            orderBy("createdAt", "desc"),
            limit(10)
        );

        const snap = await getDocs(q);

        const table = document.getElementById("historyTable");
        table.innerHTML = "";
        let index = 1; 
        snap.forEach((doc) => {
            const d = doc.data();

            const date = d.createdAt?.toDate
                ? d.createdAt.toDate().toLocaleString()
                : "-";

            table.innerHTML += `
                <tr>
                    <td>${index++}</td>
                    <td><span class="winner-badge">${d.winnerKey}</span></td>
                    <td><span class="count-badge">${d.count}</span></td>
                    <td>${d.date}</td>
                    <td>${date}</td>
                </tr>
            `;
        });

    } catch (err) {
        console.error(err);
        alert("Failed to load history");
    }
};

        window.onload = () => {
            loadHistory();
        };

    </script>

</body>

</html>
